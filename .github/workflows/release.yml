name: release

# タグ（v*）push 時に macOS / Windows のインストーラを生成して Release に添付する
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust のセットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust キャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 依存インストール
        run: npm ci

      - name: ビルド & バンドル
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase 接続情報をビルドに埋め込む（GitHub の Secrets に登録しておく）
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # 自動アップデート用の署名鍵
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '出来高表 ${{ github.ref_name }}'
          releaseBody: '自動アップデート対応のインストーラです。'
          # 自動更新の latest.json が /releases/latest/download/ で取得できるよう、ドラフトにしない
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # 両OSのビルド完了後、自動アップデート用 latest.json を生成して Release に添付
  updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: latest.json を生成してアップロード
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          ver="${TAG#v}"
          mkdir sigs && cd sigs
          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' -D .
          win_url=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[] | select(.name|endswith("x64-setup.exe")) | .url')
          mac_url=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[] | select(.name|endswith(".app.tar.gz")) | .url')
          win_sig=$(cat *x64-setup.exe.sig)
          mac_sig=$(cat *.app.tar.gz.sig)
          pub=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          VER="$ver" PUB="$pub" WIN_URL="$win_url" WIN_SIG="$win_sig" MAC_URL="$mac_url" MAC_SIG="$mac_sig" python3 - <<'PY'
          import os, json
          d={"version":os.environ["VER"],"notes":"自動アップデート対応版です。","pub_date":os.environ["PUB"],
             "platforms":{
               "windows-x86_64":{"signature":os.environ["WIN_SIG"],"url":os.environ["WIN_URL"]},
               "darwin-aarch64":{"signature":os.environ["MAC_SIG"],"url":os.environ["MAC_URL"]},
               "darwin-x86_64":{"signature":os.environ["MAC_SIG"],"url":os.environ["MAC_URL"]}}}
          open("latest.json","w").write(json.dumps(d,ensure_ascii=False,indent=2))
          PY
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
